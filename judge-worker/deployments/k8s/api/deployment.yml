apiVersion: apps/v1
kind: Deployment
metadata:
  name: api
  namespace: leetcode-judge
  labels:
    app: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: api
  template:
    metadata:
      labels:
        app: api
    spec:
      containers:
      - name: api
        image: leetcode-api:v1.0
        imagePullPolicy: Never

        env:
        - name: POSTGRES_DSN
          value: "user=postgres password=postgres host=postgres dbname=leetcode sslmode=disable"

        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "200m"

        ports:
        - containerPort: 8080
          name: http

        livenessProbe:
          httpGet:
            path: /submit
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /submit
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3

        startupProbe:
          httpGet:
            path: /submit
            port: 8080
          failureThreshold: 30
          periodSeconds: 5